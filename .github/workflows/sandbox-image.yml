name: Build sandbox image

# Builds the meow review sandbox image and pushes it to Docker Hub.
# Triggered only when the Dockerfile (or this workflow) changes on main,
# plus a manual button for ad-hoc rebuilds (e.g. when a new
# koyeb/sandbox slim base is published).

on:
  push:
    branches: [main]
    paths:
      - "src/meow/worker/sandbox/Dockerfile"
      - ".github/workflows/sandbox-image.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: src/meow/worker/sandbox
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/meow-sandbox:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/meow-sandbox:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
