name: Build images

# Builds the receiver and worker images and pushes them to Docker Hub.
# Triggered when the Dockerfile, source tree, or locked deps change on main,
# plus a manual button for ad-hoc rebuilds.

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - "src/meow/**"
      # These are build inputs for the sandbox image (sandbox-image.yml),
      # not runtime code — exclude so receiver/worker don't rebuild on touch.
      - "!src/meow/worker/sandbox/Dockerfile"
      - "!src/meow/worker/sandbox/sandbox_files/**"
      - ".github/workflows/images.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      # Surface both build outcomes — a broken worker shouldn't hide a green receiver.
      fail-fast: false
      matrix:
        target: [receiver, worker]
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/meow-${{ matrix.target }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/meow-${{ matrix.target }}:${{ github.sha }}
          # Scope per target so matrix jobs don't clobber each other's cache.
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  # Once the fresh images are on Docker Hub, roll the matching Koyeb services so
  # they re-pull the new :latest. We only redeploy the service whose code
  # actually changed — shared inputs (Dockerfile, deps, common/) rebuild both
  # images and so redeploy both. A manual run (workflow_dispatch) has no diff
  # base, so it redeploys everything. Skipped entirely if either build failed.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # paths-filter diffs HEAD against its parent on push events.
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            shared: &shared
              - "Dockerfile"
              - "pyproject.toml"
              - "uv.lock"
              - "src/meow/__init__.py"
              - "src/meow/py.typed"
              - "src/meow/common/**"
            receiver:
              - *shared
              - "src/meow/receiver/**"
            worker:
              - *shared
              - "src/meow/worker/**"
              # Sandbox build inputs ship as their own image (sandbox-image.yml).
              - "!src/meow/worker/sandbox/**"

      - name: Install Koyeb CLI
        if: >-
          github.event_name == 'workflow_dispatch' ||
          steps.changes.outputs.receiver == 'true' ||
          steps.changes.outputs.worker == 'true'
        run: |
          curl -fsSL https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | sh
          echo "$HOME/.koyeb/bin" >> "$GITHUB_PATH"

      - name: Redeploy receiver
        if: >-
          github.event_name == 'workflow_dispatch' ||
          steps.changes.outputs.receiver == 'true'
        env:
          # The CLI reads the token from KOYEB_TOKEN (viper AutomaticEnv, prefix KOYEB).
          KOYEB_TOKEN: ${{ secrets.KOYEB_CLI_TOKEN }}
        run: koyeb service redeploy "${{ secrets.KOYEB_APP }}/meow-receiver" --wait --wait-timeout=3m

      - name: Redeploy worker
        if: >-
          github.event_name == 'workflow_dispatch' ||
          steps.changes.outputs.worker == 'true'
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_CLI_TOKEN }}
        run: koyeb service redeploy "${{ secrets.KOYEB_APP }}/meow-worker" --wait --wait-timeout=3m
