name: Audit

# Scans uv.lock for known vulnerabilities (OSV.dev / PyPI advisories) and
# gates the merge: a CVE in any locked dependency fails the check.
# Complements Dependabot (which only opens update PRs without blocking).
#
# osv-scanner-action is published as a reusable workflow, so it goes
# under `jobs.<name>.uses` at the job level (no runs-on / steps).
# `fail-on-vuln: true` is the default.

on:
  pull_request:
  push:
    branches: [main]

# Required by osv-scanner-reusable: it uploads SARIF to Code Scanning by
# default. Missing any of these makes the upload step fail (not warn).
permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  audit:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.1
    with:
      scan-args: |-
        --lockfile=./uv.lock
