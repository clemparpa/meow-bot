name: Smoke E2E

# v0.0.x exit criterion (spec §17 / stories/v0.0.x.md S12).
#
# Boots the full docker compose stack (receiver + worker + caddy), POSTs a
# signed `issue_comment` webhook through Caddy, and asserts the receiver
# emitted a `webhook.accepted` JSON log line. Kept in its own workflow so
# `ci.yml` (lint + ty + pytest, ~30s) stays fast.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    # Skip when MISTRAL_API_KEY isn't available — typical for PRs from
    # forks, since GitHub doesn't pass repo secrets to fork-triggered
    # workflows. Maintainers review the diff before merge, and the smoke
    # runs on the post-merge push to `main`.
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sanity-check docker availability
        # GitHub-hosted ubuntu-* runners ship Docker Engine + Compose v2
        # preinstalled. This step fails fast with a clear message if a
        # future image bump ever drops them.
        run: |
          docker --version
          docker compose version

      - name: Write .env
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          if [ -z "$MISTRAL_API_KEY" ]; then
            echo "::error::MISTRAL_API_KEY secret is not set on this repo"
            exit 1
          fi
          cat > .env <<EOF
          MEOW_DOMAIN=localhost
          GITHUB_APP_ID=1
          GITHUB_WEBHOOK_SECRET=ci-smoke-secret
          MISTRAL_API_KEY=$MISTRAL_API_KEY
          DEPLOYMENT_NAME=meow-bot-ci
          DAYTONA_API_KEY=ci-placeholder
          EOF

      - name: Boot stack
        run: MEOW_DOMAIN=localhost docker compose up -d --build

      - name: Wait for healthz
        run: |
          for _ in $(seq 1 30); do
            if curl -fsk https://localhost/healthz >/dev/null; then
              echo "receiver healthy"
              exit 0
            fi
            sleep 2
          done
          echo "::error::receiver did not become healthy within 60s"
          exit 1

      - name: Wait for worker to register with Mistral
        # Two-step wait because `worker.started` is emitted BEFORE the SDK
        # finishes booting. We need:
        #   1. the SDK's `connected to temporal frontend` log line
        #      (proves the worker reached the scheduler and registered),
        #   2. several heartbeat cycles (~10s each) so the deployment is
        #      reflected on the REST API the receiver hits — otherwise
        #      `execute_workflow` returns `404 Deployment not found`
        #      (cf. mistral-workflows Deployments.md, lifecycle section).
        # 15s was on the edge of "1 cycle + propagation" and flaked once
        # on a green branch (the PR for S7); 30s gives 2-3 cycles of
        # margin. The retry loop in scripts/curl-webhook.sh is the second
        # line of defense if propagation drags further.
        run: |
          for _ in $(seq 1 60); do
            if docker compose logs worker | grep -q "connected to temporal frontend"; then
              echo "worker connected to Mistral scheduler"
              break
            fi
            sleep 1
          done
          if ! docker compose logs worker | grep -q "connected to temporal frontend"; then
            echo "::error::worker did not connect to Mistral scheduler within 60s"
            docker compose logs worker
            exit 1
          fi
          echo "Sleeping 30s so heartbeats propagate to api.mistral.ai"
          sleep 30

      - name: POST signed webhook
        env:
          WEBHOOK_SECRET: ci-smoke-secret
        run: bash scripts/curl-webhook.sh

      - name: Assert webhook.accepted in receiver logs
        run: |
          if ! docker compose logs receiver | grep -q '"event": "webhook.accepted"'; then
            echo "::error::webhook.accepted log line not found"
            docker compose logs receiver
            exit 1
          fi

      - name: Assert workflow.github_event.received in worker logs
        # Receiver returned 200 immediately after `execute_workflow`, but
        # the worker still has to pull the task from the queue. Poll for
        # up to 30s.
        run: |
          for _ in $(seq 1 30); do
            if docker compose logs worker | grep -q '"event": "workflow.github_event.received"'; then
              echo "worker processed event"
              exit 0
            fi
            sleep 1
          done
          echo "::error::workflow.github_event.received log line not found in worker"
          docker compose logs worker
          exit 1

      - name: Dump logs and tear down
        if: always()
        run: |
          docker compose logs
          docker compose down -v
