active_model = "mistral-medium-3.5"
textual_theme = "atom-one-dark"
vim_keybindings = false
disable_welcome_banner_animation = true
displayed_workdir = ""
auto_compact_threshold = 100000
context_warnings = false
auto_approve = true
system_prompt_id = "cli"
include_commit_signature = true
include_model_info = true
include_project_context = true
include_prompt_detail = true
enable_update_checks = false
enable_auto_update = false
api_timeout = 720.0
tool_paths = []
enabled_tools = [
    "task",
    "search_replace",
    "read_file",
    "bash",
    "grep",
    "todo",
    "write_file",
    "skill",
]
disabled_tools = []
agent_paths = []
enabled_agents = []
disabled_agents = []
skill_paths = []
enabled_skills = []
disabled_skills = []
voice_mode_enabled = false

[tools.task]
permission = "always"
allowlist = []
denylist = []

[tools.search_replace]
permission = "always"
allowlist = []
denylist = []
max_content_size = 100000
create_backup = false
fuzzy_threshold = 0.9

[tools.bash]
permission = "always"
allowlist = [
    "cat",
    "echo",
    "file",
    "find",
    "git",
    "gh",
    "head",
    "ls",
    "pwd",
    "stat",
    "tail",
    "tree",
    "uname",
    "wc",
    "which",
    "whoami",
]
denylist = [
    "gdb",
    "pdb",
    "passwd",
    "nano",
    "vim",
    "vi",
    "emacs",
    "bash -i",
    "sh -i",
    "zsh -i",
    "fish -i",
    "dash -i",
    "screen",
    "tmux",
]
max_output_bytes = 16000
default_timeout = 300
denylist_standalone = [
    "python",
    "python3",
    "ipython",
    "bash",
    "sh",
    "nohup",
    "vi",
    "vim",
    "emacs",
    "nano",
    "su",
]

[tools.grep]
permission = "always"
allowlist = []
denylist = []
max_output_bytes = 64000
default_max_matches = 100
default_timeout = 60
exclude_patterns = [
    ".venv/",
    "venv/",
    ".env/",
    "env/",
    "node_modules/",
    ".git/",
    "__pycache__/",
    ".pytest_cache/",
    ".mypy_cache/",
    ".tox/",
    ".nox/",
    ".coverage/",
    "htmlcov/",
    "dist/",
    "build/",
    ".idea/",
    ".vscode/",
    "*.egg-info",
    "*.pyc",
    "*.pyo",
    "*.pyd",
    ".DS_Store",
    "Thumbs.db",
]
codeignore_file = ".vibeignore"

[tools.ask_user_question]
permission = "ask"
allowlist = []
denylist = []

[tools.read_file]
permission = "always"
allowlist = []
denylist = []
max_read_bytes = 64000
max_state_history = 10

[tools.todo]
permission = "always"
allowlist = []
denylist = []
max_todos = 100

[tools.write_file]
permission = "always"
allowlist = []
denylist = []
max_write_bytes = 64000
create_parent_dirs = true


[[providers]]
name = "mistral"
api_base = "https://api.mistral.ai/v1"
api_key_env_var = "MISTRAL_API_KEY"
api_style = "openai"
backend = "mistral"
reasoning_field_name = "reasoning_content"

[[models]]
name = "mistral-vibe-cli-latest"
provider = "mistral"
alias = "mistral-medium-3.5"
temperature = 1.0
input_price = 1.5
output_price = 7.5
thinking = "high"

[[models]]
name = "mistral-small-latest"
provider = "mistral"
alias = "small-4"
temperature = 0.2
input_price = 0.15
output_price = 0.6
thinking = "high"

[project_context]
max_chars = 40000
default_commit_count = 5
max_doc_bytes = 32768
truncation_buffer = 1000
max_depth = 3
max_files = 1000
max_dirs_per_level = 20
timeout_seconds = 2.0

[session_logging]
save_dir = "/.vibe/logs/session"
session_prefix = "session"
enabled = false
